{% extends 'base.html' %}

{% block title %}Editar Miembro - Gestión de Equipo{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <!-- Back Button -->
        <a href="{{ url_for('bp_miembro.index') }}" class="btn btn-link text-decoration-none text-muted mb-3 d-inline-flex align-items-center gap-1.5 p-0">
            <i class="bi bi-arrow-left"></i> Volver al listado
        </a>

        <!-- Form Card -->
        <div class="card glass-card border-0 p-4 shadow-sm">
            <div class="card-body">
                <div class="d-flex align-items-center gap-3 mb-4">
                    <div class="rounded-circle d-flex align-items-center justify-content-center" style="width: 50px; height: 50px; background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(79, 70, 229, 0.15) 100%);">
                        <i class="bi bi-pencil-square text-indigo" style="font-size: 1.5rem; color: #6366f1;"></i>
                    </div>
                    <div>
                        <h3 class="fw-bold mb-0">Editar Miembro</h3>
                        <p class="text-muted small mb-0">Modifica los datos del miembro seleccionado.</p>
                    </div>
                </div>

                <hr class="text-muted opacity-25 mb-4">

                <form action="{{ url_for('bp_miembro.edit', id=miembro.id) }}" method="POST">
                    <!-- Name Input -->
                    <div class="mb-4">
                        <label for="nombre" class="form-label fw-semibold text-secondary">Nombre Completo</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0" style="border-radius: 10px 0 0 10px; border: 1.5px solid #e2e8f0;">
                                <i class="bi bi-person text-muted"></i>
                            </span>
                            <input type="text" 
                                   name="nombre" 
                                   id="nombre" 
                                   class="form-control form-control-custom ps-2" 
                                   style="border-radius: 0 10px 10px 0;"
                                   value="{{ miembro.nombre }}"
                                   placeholder="Ej. Juan Pérez" 
                                   required>
                        </div>
                        <div class="form-text text-muted small mt-1">Nombre completo para el registro.</div>
                    </div>

                    <!-- Email Input -->
                    <div class="mb-4">
                        <label for="email" class="form-label fw-semibold text-secondary">Correo Electrónico</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0" style="border-radius: 10px 0 0 10px; border: 1.5px solid #e2e8f0;">
                                <i class="bi bi-envelope text-muted"></i>
                            </span>
                            <input type="email" 
                                   name="email" 
                                   id="email" 
                                   class="form-control form-control-custom ps-2" 
                                   style="border-radius: 0 10px 10px 0;"
                                   value="{{ miembro.email }}"
                                   placeholder="Ej. juan.perez@empresa.com" 
                                   required>
                        </div>
                        <div class="form-text text-muted small mt-1">El correo del miembro para contacto.</div>
                    </div>

                    <!-- Actions -->
                    <div class="d-flex gap-3 pt-2">
                        <button type="submit" class="btn btn-primary-grad flex-grow-1 py-3">
                            <i class="bi bi-save me-2"></i>Guardar Cambios
                        </button>
                        <a href="{{ url_for('bp_miembro.index') }}" class="btn btn-outline-custom flex-grow-1 py-3 text-center">
                            Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
