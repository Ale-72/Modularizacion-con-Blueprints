{% extends 'base.html' %}

{% block title %}Registrarse - Gestión de Equipo{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-5">
        <!-- Tarjeta de Formulario -->
        <div class="card glass-card border-0 p-4 shadow-sm">
            <div class="card-body">
                <div class="d-flex align-items-center gap-3 mb-4">
                    <div class="rounded-circle d-flex align-items-center justify-content-center" style="width: 50px; height: 50px; background: linear-gradient(135deg, rgba(59, 130, 246, 0.1) 0%, rgba(29, 78, 216, 0.15) 100%);">
                        <i class="bi bi-person-plus-fill text-info" style="font-size: 1.5rem; color: #3b82f6;"></i>
                    </div>
                    <div>
                        <h3 class="fw-bold mb-0">Crear Cuenta</h3>
                        <p class="text-muted small mb-0">Regístrate para comenzar a gestionar tu equipo.</p>
                    </div>
                </div>

                <hr class="text-muted opacity-25 mb-4">

                <form action="{{ url_for('bp_auth.register') }}" method="POST">
                    <!-- Campo de Usuario -->
                    <div class="mb-4">
                        <label for="username" class="form-label fw-semibold text-secondary">Usuario</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0" style="border-radius: 10px 0 0 10px; border: 1.5px solid #e2e8f0;">
                                <i class="bi bi-person text-muted"></i>
                            </span>
                            <input type="text" 
                                   name="username" 
                                   id="username" 
                                   class="form-control form-control-custom ps-2" 
                                   style="border-radius: 0 10px 10px 0;"
                                   placeholder="Crea un nombre de usuario" 
                                   required>
                        </div>
                    </div>

                    <!-- Campo de Contraseña -->
                    <div class="mb-4">
                        <label for="password" class="form-label fw-semibold text-secondary">Contraseña</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0" style="border-radius: 10px 0 0 10px; border: 1.5px solid #e2e8f0;">
                                <i class="bi bi-lock text-muted"></i>
                            </span>
                            <input type="password" 
                                   name="password" 
                                   id="password" 
                                   class="form-control form-control-custom ps-2" 
                                   style="border-radius: 0 10px 10px 0;"
                                   placeholder="Ingresa una contraseña segura" 
                                   required>
                        </div>
                    </div>

                    <!-- Boton de Envio -->
                    <div class="d-flex flex-column gap-3 pt-2">
                        <button type="submit" class="btn btn-secondary-grad w-100 py-3">
                            <i class="bi bi-person-plus-fill me-2"></i>Registrarse
                        </button>
                        <p class="text-center text-muted small mb-0">
                            ¿Ya tienes una cuenta? <a href="{{ url_for('bp_auth.login') }}" class="text-primary text-decoration-none fw-semibold">Inicia sesión aquí</a>.
                        </p>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
